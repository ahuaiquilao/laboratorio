name: Build and publish Docker image (develop)

on:
  push:
    branches:
      - develop

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/laboratorio:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/laboratorio:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container on runner
        run: |
          docker run -d \
            --name laboratorio-app \
            -p 3000:3000 \
            ${{ secrets.DOCKERHUB_USERNAME }}/laboratorio:${{ github.sha }}

      - name: Check running container
        run: |
          sleep 10
          docker ps --filter name=laboratorio-app
          curl -fsS http://127.0.0.1:3000 || true
