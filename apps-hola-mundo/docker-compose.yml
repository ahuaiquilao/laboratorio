version: '3.8'

services:
  hola-mundo-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hola-mundo-app
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
